<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebSocket 联调台</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #151b23;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #0b6bff;
      --accent-dim: #1a4fc4;
      --out: #3fb950;
      --in: #79c0ff;
      --err: #f85149;
      --font: ui-sans-serif, system-ui, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      --mono: ui-monospace, "Cascadia Code", "SF Mono", Consolas, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      padding: 16px;
    }
    .wrap { max-width: 960px; margin: 0 auto; }
    h1 {
      font-size: 1.15rem;
      font-weight: 600;
      margin: 0 0 12px;
      letter-spacing: -0.02em;
    }
    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    input[type="url"],
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
    }
    input:focus { outline: 2px solid var(--accent); outline-offset: 0; }
    .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 12px; }
    .grow { flex: 1; min-width: 200px; }
    button {
      font-family: var(--font);
      font-size: 13px;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
    }
    button:hover:not(:disabled) { border-color: var(--accent); color: #fff; }
    button.primary {
      background: var(--accent);
      border-color: var(--accent-dim);
      color: #fff;
    }
    button.primary:hover:not(:disabled) { filter: brightness(1.08); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .badges { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    #status {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    #status.connected { color: var(--out); border-color: rgba(63, 185, 80, 0.4); }
    #status.error { color: var(--err); border-color: rgba(248, 81, 73, 0.4); }
    textarea {
      width: 100%;
      min-height: 140px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.45;
      resize: vertical;
    }
    textarea:focus { outline: 2px solid var(--accent); outline-offset: 0; }
    .presets { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .presets button { font-size: 12px; padding: 6px 10px; }
    .log-wrap {
      margin-top: 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }
    .log-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
    }
    #log {
      margin: 0;
      padding: 12px;
      height: 280px;
      overflow: auto;
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .line-out { color: var(--out); }
    .line-in { color: var(--in); }
    .line-sys { color: var(--muted); }
    .line-err { color: var(--err); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>WebSocket 文本帧联调</h1>
    <p class="hint">
      将 OTA 返回的完整 <strong>wss://</strong> URL（含 <code>device-id</code>、<code>product-id</code>、<code>authorization</code> 等 Query）粘贴到下方。
      本页仅发送 <strong>UTF-8 文本 JSON</strong>；麦克风 Opus 二进制与 TTS 下行二进制需在设备端或抓包工具中验证。
    </p>

    <label for="url">WSS 地址</label>
    <div class="row">
      <input id="url" class="grow" type="url" placeholder="wss://example.com/path?device-id=...&product-id=...&authorization=..." autocomplete="off" spellcheck="false" />
    </div>

    <div class="row">
      <button type="button" class="primary" id="btnConnect">连接</button>
      <button type="button" id="btnDisconnect" disabled>断开</button>
      <div class="badges">
        <span id="status">未连接</span>
      </div>
    </div>

    <label for="payload">待发送 JSON（单帧一个对象）</label>
    <div class="presets">
      <button type="button" data-preset="hello">填入 hello</button>
      <button type="button" data-preset="listenStart">listen start</button>
      <button type="button" data-preset="listenStop">listen stop</button>
      <button type="button" data-preset="abort">abort</button>
      <button type="button" data-preset="ping">ping</button>
    </div>
    <textarea id="payload" spellcheck="false"></textarea>
    <div class="row" style="margin-top: 10px;">
      <button type="button" class="primary" id="btnSend" disabled>发送文本帧</button>
      <button type="button" id="btnClear">清空日志</button>
    </div>

    <div class="log-wrap">
      <div class="log-head">
        <span>收发日志</span>
        <span id="sessionHint"></span>
      </div>
      <pre id="log"></pre>
    </div>
  </div>

  <script>
(function () {
  var presets = {
    hello: JSON.stringify({
      type: "hello",
      device_id: "dev_001",
      device_name: "Browser DevTools",
      device_mac: "AA:BB:CC:DD:EE:FF",
      audio_params: {
        format: "opus",
        sample_rate: 16000,
        channels: 1,
        frame_duration: 60
      },
      features: { mcp: true }
    }, null, 2),
    listenStart: JSON.stringify({ type: "listen", state: "start", mode: "manual" }, null, 2),
    listenStop: JSON.stringify({ type: "listen", state: "stop" }, null, 2),
    abort: JSON.stringify({ type: "abort", reason: "user_interrupt" }, null, 2),
    ping: JSON.stringify({ type: "ping" }, null, 2)
  };

  var ws = null;
  var urlEl = document.getElementById("url");
  var payloadEl = document.getElementById("payload");
  var logEl = document.getElementById("log");
  var statusEl = document.getElementById("status");
  var sessionHint = document.getElementById("sessionHint");
  var btnConnect = document.getElementById("btnConnect");
  var btnDisconnect = document.getElementById("btnDisconnect");
  var btnSend = document.getElementById("btnSend");
  var btnClear = document.getElementById("btnClear");

  function now() {
    var d = new Date();
    function z(n) { return n < 10 ? "0" + n : "" + n; }
    return z(d.getHours()) + ":" + z(d.getMinutes()) + ":" + z(d.getSeconds()) + "." +
      ("" + d.getMilliseconds()).padStart(3, "0");
  }

  function logLine(cls, prefix, text) {
    var span = document.createElement("span");
    span.className = cls;
    span.textContent = "[" + now() + "] " + prefix + " " + text + "\n";
    logEl.appendChild(span);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function formatMaybeJson(s) {
    try {
      var o = JSON.parse(s);
      return JSON.stringify(o, null, 2);
    } catch (e) {
      return s;
    }
  }

  function setConnected(on) {
    btnConnect.disabled = on;
    btnDisconnect.disabled = !on;
    btnSend.disabled = !on;
    statusEl.textContent = on ? "已连接" : "未连接";
    statusEl.className = on ? "connected" : "";
  }

  btnConnect.addEventListener("click", function () {
    var u = (urlEl.value || "").trim();
    if (!u) {
      alert("请先填写 WSS 地址");
      return;
    }
    if (!/^wss:\/\//i.test(u)) {
      alert("请使用 wss:// 安全连接（本工具不连接 ws:// 明文）");
      return;
    }
    try {
      ws = new WebSocket(u);
    } catch (e) {
      statusEl.textContent = "错误";
      statusEl.className = "error";
      logLine("line-err", "!", String(e && e.message ? e.message : e));
      return;
    }

    statusEl.textContent = "连接中…";
    statusEl.className = "";
    btnConnect.disabled = true;

    ws.onopen = function () {
      setConnected(true);
      logLine("line-sys", "●", "WebSocket 已打开");
    };

    ws.onerror = function () {
      logLine("line-err", "!", "WebSocket error（详见控制台或断开原因）");
      statusEl.textContent = "错误";
      statusEl.className = "error";
    };

    ws.onclose = function (ev) {
      setConnected(false);
      ws = null;
      logLine("line-sys", "●", "连接关闭 code=" + ev.code + " reason=" + (ev.reason || "(empty)"));
      statusEl.textContent = "未连接";
      statusEl.className = "";
    };

    ws.onmessage = function (ev) {
      if (typeof ev.data === "string") {
        var pretty = formatMaybeJson(ev.data);
        logLine("line-in", "←", pretty);
        try {
          var j = JSON.parse(ev.data);
          if (j && j.session_id) {
            sessionHint.textContent = "最近 session_id: " + j.session_id;
          }
        } catch (x) { /* ignore */ }
      } else if (ev.data && ev.data.byteLength !== undefined) {
        logLine("line-in", "←", "[binary " + ev.data.byteLength + " bytes]");
      } else {
        logLine("line-in", "←", String(ev.data));
      }
    };
  });

  btnDisconnect.addEventListener("click", function () {
    if (ws) {
      ws.close();
      ws = null;
    }
    setConnected(false);
  });

  btnSend.addEventListener("click", function () {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    var raw = (payloadEl.value || "").trim();
    if (!raw) {
      alert("JSON 为空");
      return;
    }
    try {
      JSON.parse(raw);
    } catch (e) {
      alert("不是合法 JSON：" + e.message);
      return;
    }
    ws.send(raw);
    logLine("line-out", "→", formatMaybeJson(raw));
  });

  btnClear.addEventListener("click", function () {
    logEl.innerHTML = "";
    sessionHint.textContent = "";
  });

  document.querySelectorAll("[data-preset]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var key = btn.getAttribute("data-preset");
      if (presets[key]) payloadEl.value = presets[key];
    });
  });

  payloadEl.value = presets.hello;
})();
  </script>
</body>
</html>
